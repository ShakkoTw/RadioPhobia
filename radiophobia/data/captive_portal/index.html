<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <!-- IMMAGINE IN BASE64: Questa stringa genera l'icona di una faccina sorridente senza caricare file esterni -->
        <img class="logo" src="logo.png" alt="Logo">

        <h2>Connessione Rete</h2>
        <p>Accedi alla rete Wi-Fi ospiti. Inserisci il codice stampato sul retro del tuo scontrino.</p>

        <form action="/login" method="POST">
            <div class="input-group">
                <label for="username">Nome Utente / Email</label>
                <input type="text" id="username" name="username" placeholder="es. mario.rossi@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="password">Codice di Accesso</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Connettiti ora</button>
        </form>
    </div>

</body>
</html>
